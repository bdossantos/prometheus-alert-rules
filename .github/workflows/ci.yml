---
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # ratchet:actions/cache@v6.0.0
        id: cache-shellcheck
        with:
          path: bin/shellcheck
          key: ${{ runner.os }}-shellcheck
          restore-keys: |
            ${{ runner.os }}-shellcheck
      - name: Setup bin directories
        run: |
          mkdir -p "$(pwd)/bin"
          export PATH=$(pwd)/bin:$HOME/.local/bin:$PATH
      - name: Get shellcheck binary
        if: steps.cache-shellcheck.outputs.cache-hit != 'true'
        run: |
          wget -qO- https://github.com/koalaman/shellcheck/releases/download/stable/shellcheck-stable.linux.x86_64.tar.xz | tar -xJv
          mv "shellcheck-stable/shellcheck" "$(pwd)/bin/shellcheck"
          chmod +x "$(pwd)/bin/shellcheck"
      - name: Run test and shellcheck
        run: |
          timeout 10m make test shellcheck
